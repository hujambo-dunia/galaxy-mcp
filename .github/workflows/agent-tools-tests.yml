name: Agent Tools (TS) Tests

on:
  push:
    branches: [main]
    paths:
      - "galaxy-agent-tools/**"
      - ".github/workflows/agent-tools-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "galaxy-agent-tools/**"
      - ".github/workflows/agent-tools-tests.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: galaxy-agent-tools

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: galaxy-agent-tools/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: galaxy-agent-tools/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Boundary lint (dependency-cruiser)
        run: pnpm depcruise

      - name: Build
        run: pnpm -r build
